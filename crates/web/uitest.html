<!doctype html>
<!--
  uitest in the browser: boots the tiny arm64 Linux Image with the uitest
  initramfs (virtio-gpu framebuffer + virtio-input keyboard/mouse) on the
  wasm-compiled emulator, JIT-accelerated.

  The emulator runs in a Web Worker (uitest-worker.js) and draws straight into an
  OffscreenCanvas, so this page's main thread only forwards input and shows the
  serial console — it never blocks on emulation, so the UI stays smooth.

  Build the web bindings first, then serve the repo root over HTTP:

      crates/web/build.sh web
      python3 -m http.server 8000        # from the repo root
      # open http://localhost:8000/crates/web/uitest.html

  (Must be served over HTTP — ES module worker + wasm fetch won't load from file://.)
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>v64 — uitest (wasm)</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #111; color: #ddd; font: 13px/1.4 ui-monospace, monospace; }
  header { padding: 8px 12px; background: #1b1b1b; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; }
  button { font: inherit; padding: 4px 12px; background: #2a6; color: #000; border: 0; border-radius: 4px; cursor: pointer; }
  button:disabled { background: #444; color: #888; cursor: default; }
  label { display: flex; gap: 5px; align-items: center; }
  #stats { margin-left: auto; color: #8c8; white-space: pre; text-align: right;
           width: 30ch; font-variant-numeric: tabular-nums; }
  main { display: flex; gap: 10px; padding: 10px; align-items: flex-start; flex-wrap: wrap; }
  #screen { background: #000; border: 1px solid #333; image-rendering: pixelated; width: 1024px; height: 768px; max-width: 100%; cursor: none; }
  #console { flex: 1; min-width: 320px; height: 768px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
             background: #000; border: 1px solid #333; padding: 8px; margin: 0; color: #cfc; }
  .hint { color: #888; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>v64 · uitest</h1>
  <button id="start">Boot</button>
  <label><input type="checkbox" id="jit" checked /> JIT</label>
  <span class="hint">click screen to capture mouse · keys go to the guest · Esc(in guest) quits uitest</span>
  <span id="stats"></span>
</header>
<main>
  <canvas id="screen" width="1024" height="768"></canvas>
  <pre id="console"></pre>
</main>

<script type="module">
const startBtn = document.getElementById('start');
const jitBox   = document.getElementById('jit');
const statsEl  = document.getElementById('stats');
const consoleEl = document.getElementById('console');
const canvas   = document.getElementById('screen');

function log(s) {
  const atBottom = consoleEl.scrollTop + consoleEl.clientHeight >= consoleEl.scrollHeight - 4;
  consoleEl.textContent += s;
  if (atBottom) consoleEl.scrollTop = consoleEl.scrollHeight;
}

// --- KeyboardEvent.code -> Linux evdev keycode (enough to drive the UI) ---
const KEYS = {
  Escape:1, Digit1:2,Digit2:3,Digit3:4,Digit4:5,Digit5:6,Digit6:7,Digit7:8,Digit8:9,Digit9:10,Digit0:11,
  Minus:12, Equal:13, Backspace:14, Tab:15,
  KeyQ:16,KeyW:17,KeyE:18,KeyR:19,KeyT:20,KeyY:21,KeyU:22,KeyI:23,KeyO:24,KeyP:25,
  BracketLeft:26, BracketRight:27, Enter:28, ControlLeft:29,
  KeyA:30,KeyS:31,KeyD:32,KeyF:33,KeyG:34,KeyH:35,KeyJ:36,KeyK:37,KeyL:38, Semicolon:39, Quote:40, Backquote:41,
  ShiftLeft:42, Backslash:43, KeyZ:44,KeyX:45,KeyC:46,KeyV:47,KeyB:48,KeyN:49,KeyM:50, Comma:51, Period:52, Slash:53,
  ShiftRight:54, AltLeft:56, Space:57, CapsLock:58,
  F1:59,F2:60,F3:61,F4:62,F5:63,F6:64,F7:65,F8:66,F9:67,F10:68,
  ArrowUp:103, ArrowLeft:105, ArrowRight:106, ArrowDown:108, ControlRight:97, AltRight:100,
};
const BTN = { 0:0x110, 1:0x112, 2:0x111 }; // JS button -> BTN_LEFT/MIDDLE/RIGHT

let worker = null;
let running = false;

function fmtStats(m) {
  const insns = `${(m.insns / 1e6).toFixed(1)}`.padStart(6) + 'M';
  const mips = (m.mips ? m.mips.toFixed(0) : '—').padStart(4) + ' MIPS';
  const mode = (m.jit ? `JIT ${m.cov.toFixed(0).padStart(3)}%` : 'interp').padStart(8);
  statsEl.textContent = `${insns}  ${mips}  ${mode}`;
}

function boot() {
  if (!('transferControlToOffscreen' in canvas)) {
    log('[error: this browser lacks OffscreenCanvas — try a recent Chrome/Firefox]\n');
    return;
  }
  startBtn.disabled = true;
  startBtn.textContent = 'Booting…';
  consoleEl.textContent = '';

  worker = new Worker('./uitest-worker.js', { type: 'module' });
  worker.onmessage = (e) => {
    const m = e.data;
    if (m.ev === 'uart' || m.ev === 'log') log(m.text);
    else if (m.ev === 'stats') fmtStats(m);
    else if (m.ev === 'off') { log('\n[guest powered off]\n'); stop(); }
  };
  worker.onerror = (e) => { log(`\n[worker error: ${e.message}]\n`); stop(); };

  const offscreen = canvas.transferControlToOffscreen();
  worker.postMessage({ cmd: 'start', canvas: offscreen }, [offscreen]);
  worker.postMessage({ cmd: 'jit', on: jitBox.checked });
  running = true;
}

function stop() {
  running = false;
  // The canvas control was transferred to the worker, so re-booting needs a
  // fresh page; prompt for a reload rather than re-enabling Boot.
  startBtn.textContent = 'Reload to re-boot';
  startBtn.disabled = true;
}

startBtn.addEventListener('click', boot);
jitBox.addEventListener('change', () => { if (worker) worker.postMessage({ cmd: 'jit', on: jitBox.checked }); });

// --- input: forward keyboard/mouse to the worker while running ---
addEventListener('keydown', (e) => {
  if (!running) return;
  const code = KEYS[e.code];
  if (code !== undefined) { worker.postMessage({ cmd: 'key', code, down: true }); e.preventDefault(); }
});
addEventListener('keyup', (e) => {
  if (!running) return;
  const code = KEYS[e.code];
  if (code !== undefined) { worker.postMessage({ cmd: 'key', code, down: false }); e.preventDefault(); }
});

canvas.addEventListener('click', () => { if (running) canvas.requestPointerLock(); });
canvas.addEventListener('mousemove', (e) => {
  if (running && document.pointerLockElement === canvas)
    worker.postMessage({ cmd: 'motion', dx: e.movementX, dy: e.movementY, wheel: 0 });
});
canvas.addEventListener('mousedown', (e) => {
  if (running && document.pointerLockElement === canvas) {
    worker.postMessage({ cmd: 'button', code: BTN[e.button] ?? 0x110, down: true }); e.preventDefault();
  }
});
addEventListener('mouseup', (e) => {
  if (running && document.pointerLockElement === canvas)
    worker.postMessage({ cmd: 'button', code: BTN[e.button] ?? 0x110, down: false });
});
canvas.addEventListener('wheel', (e) => {
  if (running && document.pointerLockElement === canvas) {
    worker.postMessage({ cmd: 'motion', dx: 0, dy: 0, wheel: e.deltaY < 0 ? 1 : -1 }); e.preventDefault();
  }
}, { passive: false });
</script>
</body>
</html>
