# Force Xorg onto the framebuffer device (/dev/fb0, backed by virtio-gpu via
# DRM_FBDEV_EMULATION) instead of probing for KMS/3D. Input (the virtio keyboard
# and mouse) is autodetected by libinput via eudev, so no InputDevice section is
# needed here.
Section "Device"
    Identifier  "fb0"
    Driver      "fbdev"
    Option      "fbdev" "/dev/fb0"
EndSection
