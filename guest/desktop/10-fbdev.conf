# Force Xorg onto the framebuffer device (/dev/fb0, backed by virtio-gpu via
# DRM_FBDEV_EMULATION) rather than probing for KMS/3D, and route the virtio
# keyboard/mouse through libinput.
Section "Device"
    Identifier  "fb0"
    Driver      "fbdev"
    Option      "fbdev" "/dev/fb0"
EndSection

Section "InputClass"
    Identifier  "virtio-input"
    MatchIsKeyboard "on"
    MatchIsPointer  "on"
    Driver      "libinput"
EndSection
